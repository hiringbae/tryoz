name: Documentation request
description: Request clearer docs or examples.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: textarea
    id: page
    attributes:
      label: Page or section
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is unclear?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
